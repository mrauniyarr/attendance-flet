name: Build Attendance APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flet openpyxl

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          # We remove the permissions flag entirely. 
          # Flet includes INTERNET by default, and sharing works without the storage flags.
          flet build apk . \
            --project "AttendancePro" \
            --org "com.mrauniyarr.attendance" \
            --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-app-release
          path: build/apk/*.apk
